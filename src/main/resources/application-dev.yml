# ============================================================
# AML System - Development Environment Configuration
# ============================================================

# ---- Datasource (MySQL) ----
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aml_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${AML_DEV_DB_USER:root}
    password: ${AML_DEV_DB_PASSWORD:CHANGE_ME_DEV_DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  neo4j:
    uri: ${AML_DEV_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${AML_DEV_NEO4J_USERNAME:neo4j}
      password: ${AML_DEV_NEO4J_PASSWORD:CHANGE_ME_DEV_NEO4J_PASSWORD}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ---- Redis ----
spring.data:
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000

# ---- Kafka ----
spring.kafka:
  bootstrap-servers: localhost:9092
  producer:
    acks: all
    retries: 3
  consumer:
    auto-offset-reset: earliest
    group-id: aml-consumer-group

# ---- Elasticsearch ----
spring.elasticsearch:
  uris: http://localhost:9200
  connection-timeout: 5s
  socket-timeout: 10s

# ---- MinIO Object Storage ----
aml.minio:
  endpoint: ${AML_DEV_MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${AML_DEV_MINIO_ACCESS_KEY:CHANGE_ME_DEV_MINIO_ACCESS}
  secret-key: ${AML_DEV_MINIO_SECRET_KEY:CHANGE_ME_DEV_MINIO_SECRET}
  bucket-name: ${AML_DEV_MINIO_BUCKET:aml-files}

# ---- Neo4j Graph Database ----
spring.neo4j:
  uri: ${AML_DEV_NEO4J_URI:bolt://localhost:7687}
  authentication:
    username: ${AML_DEV_NEO4J_USERNAME:neo4j}
    password: ${AML_DEV_NEO4J_PASSWORD:CHANGE_ME_DEV_NEO4J_PASSWORD}
# ---- JWT Authentication ----
jwt:
  secret: ${AML_DEV_JWT_SECRET:Q0hBTkdFX01FX0xPQ0FMX0RFVl9KV1RfU0VDUkVUXzMyX0JZVEVTX01JTklNVU1fUExBQ0VIT0xERVI=}
  access-token-expire: 7200000      # 2小时 (7200秒 * 1000 = 毫秒)
  refresh-token-expire: 604800000   # 7天 (604800秒 * 1000 = 毫秒)

# ---- Encryption ----
encryption:
  key: ${AML_DEV_ENCRYPTION_KEY:CHANGE_ME_LOCAL_AES_32_BYTE_KEY!}

# ---- AML Business Config ----
aml:
  screening:
    match-threshold: 85
  kafka:
    topic: aml-transactions

# ---- Logging ----
logging:
  level:
    root: INFO
    com.insurance.aml: DEBUG
