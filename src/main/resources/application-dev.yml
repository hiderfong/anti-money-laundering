# ============================================================
# AML System - Development Environment Configuration
# ============================================================

# ---- Datasource (MySQL) ----
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aml_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: aml_dev_123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ---- Redis ----
spring.data:
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000

# ---- Kafka ----
spring.kafka:
  bootstrap-servers: localhost:9092
  producer:
    acks: all
    retries: 3
  consumer:
    auto-offset-reset: earliest
    group-id: aml-consumer-group

# ---- Elasticsearch ----
spring.elasticsearch:
  uris: http://localhost:9200
  connection-timeout: 5s
  socket-timeout: 10s

# ---- MinIO Object Storage ----
aml.minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: aml-files

# ---- JWT Authentication ----
jwt:
  secret: AmlSystem2024JwtSecretKeyForDevEnvironmentOnly
  access-token-expire: 7200000      # 2小时 (7200秒 * 1000 = 毫秒)
  refresh-token-expire: 604800000   # 7天 (604800秒 * 1000 = 毫秒)

# ---- Encryption ----
encryption:
  key: AmlEncryptKey2024DevEnv!

# ---- AML Business Config ----
aml:
  screening:
    match-threshold: 85
  kafka:
    topic: aml-transactions

# ---- Logging ----
logging:
  level:
    root: INFO
    com.insurance.aml: DEBUG
