# ============================================================
# AML System - Main Configuration
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  # JDK 21 Virtual Threads - 提升高并发交易处理能力
  threads:
    virtual:
      enabled: true

  # Jackson JSON serialization
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ============================================================
# MyBatis-Plus Configuration
# ============================================================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.insurance.aml.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================================
# Flyway Database Migration
# ============================================================
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

# ============================================================
# Knife4j API Documentation
# ============================================================
knife4j:
  enable: true

# ============================================================
# Logging Configuration
# ============================================================
logging:
  level:
    root: INFO
    com.insurance.aml: DEBUG

# ============================================================
# Actuator Monitor Endpoints
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when-authorized

# ============================================================
# AML ML Model Configuration (Isolation Forest)
# ============================================================
aml:
  ml:
    model-path: ./data/models
    training-days: 90
    anomaly-threshold: 0.7
    num-trees: 100
    subsample-size: 256
