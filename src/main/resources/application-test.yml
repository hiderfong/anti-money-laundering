# 集成测试配置 - 使用嵌入式数据库，Mock外部依赖
server:
  port: 8081

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:aml_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
    username: sa
    password:
  h2:
    console:
      enabled: true
  flyway:
    enabled: false
  # 禁用不需要的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.data.elasticsearch.repository.config.ElasticsearchRepositoryAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: test-jwt-secret-key-for-integration-testing-only-2025-aml-system
  access-token-expire: 7200000      # 2小时 (毫秒)
  refresh-token-expire: 604800

# 加密配置
encryption:
  key: test-aes-256-encryption-key-dev

# AML配置
aml:
  screening:
    match-threshold: 85
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: aml-test

logging:
  level:
    root: INFO
    com.insurance.aml: DEBUG
    org.springframework.security: WARN
