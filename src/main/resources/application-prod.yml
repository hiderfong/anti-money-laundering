# ============================================================
# AML System - Production Environment Configuration
# ============================================================
# 所有敏感项必须通过环境变量或密钥管理系统注入。
# 发布前运行 scripts/prod-readiness-check.sh，避免占位值进入生产。

server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${AML_DB_URL:jdbc:mysql://${AML_DB_HOST:localhost}:${AML_DB_PORT:3306}/${AML_DB_NAME:aml_system}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false}"
    username: ${AML_DB_USER}
    password: ${AML_DB_PASSWORD}
    hikari:
      minimum-idle: ${AML_DB_POOL_MIN_IDLE:10}
      maximum-pool-size: ${AML_DB_POOL_MAX_SIZE:50}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: AmlHikariCP-Prod

  data:
    redis:
      host: ${AML_REDIS_HOST:localhost}
      port: ${AML_REDIS_PORT:6379}
      password: ${AML_REDIS_PASSWORD:}
      database: ${AML_REDIS_DATABASE:0}
      timeout: ${AML_REDIS_TIMEOUT:10000}
      lettuce:
        pool:
          max-active: ${AML_REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${AML_REDIS_POOL_MAX_IDLE:8}
          min-idle: ${AML_REDIS_POOL_MIN_IDLE:4}

  kafka:
    bootstrap-servers: ${AML_KAFKA_BROKERS}
    consumer:
      group-id: ${AML_KAFKA_CONSUMER_GROUP:aml-consumer-group-prod}
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  elasticsearch:
    uris: ${AML_ES_URIS:http://localhost:9200}
    username: ${AML_ES_USERNAME:}
    password: ${AML_ES_PASSWORD:}

  neo4j:
    uri: ${AML_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${AML_NEO4J_USERNAME:neo4j}
      password: ${AML_NEO4J_PASSWORD:}

# ---- MinIO Object Storage ----
aml:
  minio:
    endpoint: ${AML_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${AML_MINIO_ACCESS_KEY}
    secret-key: ${AML_MINIO_SECRET_KEY}
    bucket-name: ${AML_MINIO_BUCKET:aml-documents-prod}
  screening:
    match-threshold: ${AML_SCREENING_MATCH_THRESHOLD:85}
  kafka:
    enabled: ${AML_KAFKA_ENABLED:true}
    topic: ${AML_KAFKA_TOPIC:aml-transactions}
  redis:
    enabled: ${AML_REDIS_ENABLED:true}
  neo4j:
    enabled: ${AML_NEO4J_ENABLED:true}
  cors:
    allowed-origins: ${AML_CORS_ORIGINS}
  slow-query:
    enabled: true
    threshold: ${AML_SLOW_QUERY_THRESHOLD_MS:500}

# ---- JWT Authentication ----
jwt:
  secret: ${AML_JWT_SECRET}
  access-token-expire: ${AML_JWT_ACCESS_TOKEN_EXPIRE_MS:3600000}
  refresh-token-expire: ${AML_JWT_REFRESH_TOKEN_EXPIRE_MS:604800000}

# ---- Field Encryption ----
encryption:
  key: ${AML_ENCRYPTION_KEY}

# ---- API Documentation ----
knife4j:
  enable: ${AML_API_DOCS_ENABLED:false}

# ---- Actuator Monitor Endpoints ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

# ---- Logging ----
logging:
  level:
    root: ${AML_LOG_LEVEL_ROOT:WARN}
    com.insurance.aml: ${AML_LOG_LEVEL_APP:INFO}
