name: AML System CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ===== 后端构建 + 测试 =====
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Tests
        run: mvn test -B

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: target/surefire-reports/
          retention-days: 7

  # ===== 前端构建 + 检查 =====
  frontend:
    name: Frontend Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Type Check
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ===== Docker 构建 =====
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t aml-system:${{ github.sha }} -f docker/Dockerfile .
          docker tag aml-system:${{ github.sha }} aml-system:latest

      - name: Save Docker Image
        run: docker save aml-system:latest | gzip > aml-system.tar.gz

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: aml-system.tar.gz
          retention-days: 7

  # ===== E2E 测试 =====
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Start Backend (background)
        run: |
          mvn spring-boot:run -Dspring-boot.run.profiles=dev,no-es &
          sleep 60

      - name: Start Frontend (background)
        working-directory: frontend
        run: |
          npm run dev &
          sleep 10

      - name: Run E2E Tests
        run: |
          chmod +x scripts/e2e-test.sh
          chmod +x scripts/frontend-e2e.sh
          ./scripts/e2e-test.sh
          ./scripts/frontend-e2e.sh

      - name: Cleanup
        if: always()
        run: |
          pkill -f "spring-boot:run" || true
          pkill -f "vite" || true
