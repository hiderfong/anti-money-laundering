name: AML System Release Gate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  MAVEN_OPTS: "-Xmx1536m"
  PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"

jobs:
  backend-test:
    name: Backend Unit And Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backend toolchain
        run: |
          if ! command -v java >/dev/null 2>&1 || ! command -v mvn >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            $SUDO apt-get update
            $SUDO apt-get install -y openjdk-21-jdk maven
          fi
          java -version
          mvn -version

      - name: Run backend tests
        run: bash scripts/ci-maven.sh test

      - name: List backend test reports
        if: always()
        run: |
          if [ -d target/surefire-reports ]; then
            find target/surefire-reports -maxdepth 1 -type f | sort
          else
            echo "No backend test reports found."
          fi

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Node toolchain
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build output
        run: |
          test -d frontend/dist
          du -sh frontend/dist
          find frontend/dist -maxdepth 2 -type f | sort | head -n 80

  prod-readiness:
    name: Production Readiness Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify example env is rejected
        run: |
          if bash scripts/prod-readiness-check.sh .env.example; then
            echo ".env.example should contain placeholders and fail readiness checks"
            exit 1
          fi

      - name: Verify valid production env passes
        run: |
          cat > /tmp/aml-prod-valid.env <<'EOF'
          SPRING_PROFILES_ACTIVE=prod,no-es
          AML_DB_HOST=db.internal
          AML_DB_PORT=3306
          AML_DB_NAME=aml_system
          AML_DB_USER=aml_prod
          AML_DB_PASSWORD=strong-db-password
          AML_REDIS_ENABLED=false
          AML_REDIS_HOST=redis.internal
          AML_REDIS_PORT=6379
          AML_REDIS_PASSWORD=strong-redis-password
          AML_KAFKA_ENABLED=false
          AML_KAFKA_BROKERS=kafka.internal:9092
          AML_ES_URIS=https://es.internal:9200
          AML_MINIO_ENDPOINT=https://minio.internal
          AML_MINIO_ACCESS_KEY=minio-access
          AML_MINIO_SECRET_KEY=minio-secret
          AML_MINIO_BUCKET=aml-documents-prod
          AML_NEO4J_ENABLED=false
          AML_NEO4J_URI=bolt://neo4j.internal:7687
          AML_NEO4J_USERNAME=neo4j
          AML_NEO4J_PASSWORD=strong-neo4j-password
          AML_JWT_SECRET=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AML_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
          AML_CORS_ORIGINS=https://aml.internal,https://admin.aml.internal
          AML_API_DOCS_ENABLED=false
          EOF
          bash scripts/prod-readiness-check.sh /tmp/aml-prod-valid.env

      - name: Validate scripts
        run: |
          bash -n scripts/deploy.sh
          bash -n scripts/prod-readiness-check.sh
          bash -n scripts/e2e-test.sh
          bash -n scripts/frontend-e2e.sh
          bash -n scripts/frontend-browser-e2e.sh
          bash -n scripts/rbac-e2e.sh
          bash -n scripts/prepare-rbac-e2e-users.sh

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-test
      - frontend-build
      - prod-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: DOCKER_BUILDKIT=1 docker build -t aml-system:${{ github.sha }} -f docker/Dockerfile .

  e2e:
    name: End-To-End Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - backend-test
      - frontend-build
      - prod-readiness
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: aml_dev_123
          MYSQL_DATABASE: aml_system
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -paml_dev_123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      BASE_URL: http://127.0.0.1:8080/api
      API_URL: http://127.0.0.1:8080/api
      FRONTEND_URL: http://127.0.0.1:5173
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: aml_system
      DB_USER: root
      DB_PASSWORD: aml_dev_123
      E2E_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
      E2E_IP: 127.0.0.201
      E2E_LIMIT_IP: 127.0.0.202
      HEADLESS: "true"
      AML_REDIS_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: org.redisson.spring.starter.RedissonAutoConfigurationV2,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aml_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools
        run: |
          if ! command -v java >/dev/null 2>&1 || \
             ! command -v mvn >/dev/null 2>&1 || \
             ! command -v mysqladmin >/dev/null 2>&1 || \
             ! command -v jq >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            $SUDO apt-get update
            $SUDO apt-get install -y curl jq default-mysql-client openjdk-21-jdk maven
          fi
          java -version
          mvn -version
          node --version
          npm --version

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready"
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: |
          if [ -d "$PLAYWRIGHT_BROWSERS_PATH" ]; then
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Warm backend Maven dependencies
        run: bash scripts/ci-maven.sh -DskipTests package

      - name: Start backend
        run: |
          nohup mvn -B -ntp spring-boot:run \
            -Dspring-boot.run.profiles=dev,no-redis,no-es \
            -Dspring-boot.run.arguments="--aml.kafka.enabled=false --aml.redis.enabled=false --spring.datasource.url=${SPRING_DATASOURCE_URL} --spring.datasource.username=${DB_USER} --spring.datasource.password=${DB_PASSWORD}" \
            > /tmp/aml-backend.log 2>&1 &
          echo $! > /tmp/aml-backend.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/api/system/health >/tmp/aml-health.json; then
              cat /tmp/aml-health.json
              exit 0
            fi
            sleep 2
          done

          cat /tmp/aml-backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 > /tmp/aml-frontend.log 2>&1 &
          echo $! > /tmp/aml-frontend.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/aml-frontend.log
          exit 1

      - name: Prepare RBAC E2E users
        run: bash scripts/prepare-rbac-e2e-users.sh --execute

      - name: Run API E2E
        run: bash scripts/e2e-test.sh

      - name: Run frontend smoke E2E
        run: bash scripts/frontend-e2e.sh

      - name: Run frontend browser E2E
        run: bash scripts/frontend-browser-e2e.sh

      - name: Run RBAC E2E
        run: bash scripts/rbac-e2e.sh

      - name: List E2E screenshots
        if: always()
        run: |
          if [ -d /tmp/aml-frontend-browser-e2e ]; then
            find /tmp/aml-frontend-browser-e2e -maxdepth 2 -type f | sort
          else
            echo "No frontend browser E2E screenshots found."
          fi

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "---- backend log ----"
          cat /tmp/aml-backend.log || true
          echo "---- frontend log ----"
          cat /tmp/aml-frontend.log || true
