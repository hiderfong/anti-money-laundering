name: AML System Release Gate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  MAVEN_OPTS: "-Xmx1536m"

jobs:
  backend-test:
    name: Backend Unit And Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run backend tests
        run: mvn -q test

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: bash ../scripts/ci-npm.sh ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

  prod-readiness:
    name: Production Readiness Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify example env is rejected
        run: |
          if bash scripts/prod-readiness-check.sh .env.example; then
            echo ".env.example should contain placeholders and fail readiness checks"
            exit 1
          fi

      - name: Verify valid production env passes
        run: |
          cat > /tmp/aml-prod-valid.env <<'EOF'
          SPRING_PROFILES_ACTIVE=prod,no-es
          AML_DB_HOST=db.internal
          AML_DB_PORT=3306
          AML_DB_NAME=aml_system
          AML_DB_USER=aml_prod
          AML_DB_PASSWORD=strong-db-password
          AML_REDIS_ENABLED=false
          AML_REDIS_HOST=redis.internal
          AML_REDIS_PORT=6379
          AML_REDIS_PASSWORD=strong-redis-password
          AML_KAFKA_ENABLED=false
          AML_KAFKA_BROKERS=kafka.internal:9092
          AML_ES_URIS=https://es.internal:9200
          AML_MINIO_ENDPOINT=https://minio.internal
          AML_MINIO_ACCESS_KEY=minio-access
          AML_MINIO_SECRET_KEY=minio-secret
          AML_MINIO_BUCKET=aml-documents-prod
          AML_NEO4J_ENABLED=false
          AML_NEO4J_URI=bolt://neo4j.internal:7687
          AML_NEO4J_USERNAME=neo4j
          AML_NEO4J_PASSWORD=strong-neo4j-password
          AML_JWT_SECRET=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AML_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
          AML_CORS_ORIGINS=https://aml.internal,https://admin.aml.internal
          AML_API_DOCS_ENABLED=false
          EOF
          chmod 600 /tmp/aml-prod-valid.env
          bash scripts/prod-readiness-check.sh /tmp/aml-prod-valid.env
          bash scripts/deploy-preflight.sh /tmp/aml-prod-valid.env --skip-compose

      - name: Validate scripts
        run: |
          bash -n scripts/deploy.sh
          bash -n scripts/deploy-preflight.sh
          bash -n scripts/prod-readiness-check.sh
          bash -n scripts/e2e-test.sh
          bash -n scripts/frontend-e2e.sh
          bash -n scripts/frontend-browser-e2e.sh
          bash -n scripts/ci-e2e-step.sh
          bash -n scripts/collect-e2e-artifacts.sh
          bash -n scripts/rbac-e2e.sh
          bash -n scripts/prepare-rbac-e2e-users.sh

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-test
      - frontend-build
      - prod-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: DOCKER_BUILDKIT=1 docker build -t aml-system:${{ github.sha }} -f docker/Dockerfile .

  e2e:
    name: End-To-End Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend-test
      - frontend-build
      - prod-readiness
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: aml_dev_123
          MYSQL_DATABASE: aml_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -paml_dev_123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      BASE_URL: http://127.0.0.1:8080/api
      API_URL: http://127.0.0.1:8080/api
      FRONTEND_URL: http://127.0.0.1:5173
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_NAME: aml_system
      DB_USER: root
      DB_PASSWORD: aml_dev_123
      E2E_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
      E2E_IP: 127.0.0.201
      E2E_LIMIT_IP: 127.0.0.202
      RBAC_E2E_IP: 127.0.0.203
      E2E_ARTIFACT_DIR: /tmp/aml-e2e-artifacts
      SCREENSHOT_DIR: /tmp/aml-frontend-browser-e2e
      HEADLESS: "true"
      AML_REDIS_ENABLED: "false"
      AML_NEO4J_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: org.redisson.spring.starter.RedissonAutoConfigurationV2,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/aml_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize E2E artifact directory
        run: mkdir -p "$E2E_ARTIFACT_DIR/logs" "$E2E_ARTIFACT_DIR/status" "$E2E_ARTIFACT_DIR/screenshots"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system tools
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y curl jq default-mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready"
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: bash ../scripts/ci-npm.sh ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          nohup mvn spring-boot:run \
            -Dspring-boot.run.profiles=dev,no-redis,no-es \
            -Dspring-boot.run.arguments="--aml.kafka.enabled=false --aml.redis.enabled=false --aml.neo4j.enabled=false --spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE} --spring.datasource.url=${SPRING_DATASOURCE_URL} --spring.datasource.username=${DB_USER} --spring.datasource.password=${DB_PASSWORD}" \
            > /tmp/aml-backend.log 2>&1 &
          echo $! > /tmp/aml-backend.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/api/system/health >/tmp/aml-health.json; then
              cat /tmp/aml-health.json
              exit 0
            fi
            sleep 2
          done

          cat /tmp/aml-backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 > /tmp/aml-frontend.log 2>&1 &
          echo $! > /tmp/aml-frontend.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/aml-frontend.log
          exit 1

      - name: Prepare RBAC E2E users
        run: bash scripts/ci-e2e-step.sh "Prepare RBAC E2E users" bash scripts/prepare-rbac-e2e-users.sh --execute

      - name: Run API E2E
        run: bash scripts/ci-e2e-step.sh "API E2E" bash scripts/e2e-test.sh

      - name: Run frontend smoke E2E
        run: bash scripts/ci-e2e-step.sh "Frontend smoke E2E" bash scripts/frontend-e2e.sh

      - name: Run frontend browser E2E
        run: bash scripts/ci-e2e-step.sh "Frontend browser E2E" bash scripts/frontend-browser-e2e.sh

      - name: Run RBAC E2E
        run: bash scripts/ci-e2e-step.sh "RBAC E2E" bash scripts/rbac-e2e.sh

      - name: Collect E2E artifacts
        if: always()
        run: bash scripts/collect-e2e-artifacts.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-release-gate-artifacts
          path: /tmp/aml-e2e-artifacts
          retention-days: 14
          if-no-files-found: warn

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "---- backend log ----"
          cat /tmp/aml-backend.log || true
          echo "---- frontend log ----"
          cat /tmp/aml-frontend.log || true
