# =============================================================
# AML System - Docker Compose (Development - Infrastructure Only)
# =============================================================
# Lighter version for local development.
# Run the Spring Boot application from your IDE instead.
#
# Usage:
#   Start infra:         docker compose -f docker-compose-dev.yml up -d
#   View logs:           docker compose -f docker-compose-dev.yml logs -f
#   Stop infra:          docker compose -f docker-compose-dev.yml down
#   Stop & remove data:  docker compose -f docker-compose-dev.yml down -v
# =============================================================

version: "3.8"

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: aml-mysql-dev
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-CHANGE_ME_DEV_DB_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-aml_system}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-CHANGE_ME_DEV_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: aml-redis-dev
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Apache Kafka 3.7 ----
  kafka:
    image: apache/kafka:3.7.0
    container_name: aml-kafka-dev
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPIC_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_LOG_DIRS=/tmp/kafka-logs
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Elasticsearch 8.12.0 ----
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: aml-elasticsearch-dev
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=aml-cluster
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Neo4j 5.12 (Graph Database - Transaction Network Analysis) ----
  neo4j:
    image: neo4j:5.12-community
    container_name: aml-neo4j-dev
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-CHANGE_ME_DEV_NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Gitea (Git Server) ----
  gitea:
    image: gitea/gitea:latest
    container_name: aml-gitea-dev
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__service__DISABLE_REGISTRATION=true
    volumes:
      - gitea-data:/data
    networks:
      - aml-network
    restart: unless-stopped

  # ---- MinIO Object Storage ----
  minio:
    image: minio/minio
    container_name: aml-minio-dev
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-CHANGE_ME_DEV_MINIO_ACCESS}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-CHANGE_ME_DEV_MINIO_SECRET}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - aml-network
    restart: unless-stopped

# ---- Networks ----
networks:
  aml-network:
    driver: bridge

# ---- Volumes ----
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local
  es-data:
    driver: local
  minio-data:
    driver: local
  gitea-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
