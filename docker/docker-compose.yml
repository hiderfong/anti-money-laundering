# =============================================================
# AML System - Docker Compose (Full Stack)
# =============================================================
# Usage:
#   Start all services:  docker compose up -d
#   View logs:           docker compose logs -f
#   Stop all services:   docker compose down
#   Stop & remove data:  docker compose down -v
# =============================================================

services:
  # ---- AML Application ----
  aml-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aml-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - AML_DB_HOST=mysql
      - AML_DB_PORT=3306
      - AML_DB_NAME=${AML_DB_NAME:-aml_system}
      - AML_DB_USER=${AML_DB_USER:-root}
      - AML_DB_PASSWORD=${AML_DB_PASSWORD:?Set AML_DB_PASSWORD in .env}
      - AML_REDIS_ENABLED=${AML_REDIS_ENABLED:-true}
      - AML_REDIS_HOST=redis
      - AML_REDIS_PORT=6379
      - AML_REDIS_PASSWORD=${AML_REDIS_PASSWORD:?Set AML_REDIS_PASSWORD in .env}
      - AML_KAFKA_ENABLED=${AML_KAFKA_ENABLED:-true}
      - AML_KAFKA_BROKERS=${AML_KAFKA_BROKERS:-kafka:9092}
      - AML_ES_URIS=${AML_ES_URIS:-http://elasticsearch:9200}
      - AML_NEO4J_ENABLED=${AML_NEO4J_ENABLED:-false}
      - AML_NEO4J_PASSWORD=${AML_NEO4J_PASSWORD:-}
      - AML_MINIO_ENDPOINT=${AML_MINIO_ENDPOINT:-http://minio:9000}
      - AML_MINIO_ACCESS_KEY=${AML_MINIO_ACCESS_KEY:?Set AML_MINIO_ACCESS_KEY in .env}
      - AML_MINIO_SECRET_KEY=${AML_MINIO_SECRET_KEY:?Set AML_MINIO_SECRET_KEY in .env}
      - AML_MINIO_BUCKET=${AML_MINIO_BUCKET:-aml-documents-prod}
      - AML_JWT_SECRET=${AML_JWT_SECRET:?Set AML_JWT_SECRET in .env}
      - AML_ENCRYPTION_KEY=${AML_ENCRYPTION_KEY:?Set AML_ENCRYPTION_KEY in .env}
      - AML_CORS_ORIGINS=${AML_CORS_ORIGINS:?Set AML_CORS_ORIGINS in .env}
      - AML_API_DOCS_ENABLED=${AML_API_DOCS_ENABLED:-false}
    volumes:
      - aml-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - aml-network
    restart: unless-stopped

  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: aml-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${AML_DB_PASSWORD:?Set AML_DB_PASSWORD in .env}
      - MYSQL_DATABASE=${AML_DB_NAME:-aml_system}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${AML_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: aml-redis
    ports:
      - "6379:6379"
    environment:
      - AML_REDIS_PASSWORD=${AML_REDIS_PASSWORD:?Set AML_REDIS_PASSWORD in .env}
    command: redis-server --appendonly yes --requirepass ${AML_REDIS_PASSWORD:?Set AML_REDIS_PASSWORD in .env} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$AML_REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Apache Kafka 3.6 ----
  kafka:
    image: bitnami/kafka:3.6
    container_name: aml-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPIC_ENABLE=true
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_NUM_PARTITIONS=3
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - aml-network
    restart: unless-stopped

  # ---- Elasticsearch 8.12.0 ----
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: aml-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=aml-cluster
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - aml-network
    restart: unless-stopped

  # ---- MinIO Object Storage ----
  minio:
    image: minio/minio
    container_name: aml-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${AML_MINIO_ACCESS_KEY:?Set AML_MINIO_ACCESS_KEY in .env}
      - MINIO_ROOT_PASSWORD=${AML_MINIO_SECRET_KEY:?Set AML_MINIO_SECRET_KEY in .env}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - aml-network
    restart: unless-stopped

# ---- Networks ----
networks:
  aml-network:
    driver: bridge

# ---- Volumes ----
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local
  es-data:
    driver: local
  minio-data:
    driver: local
  aml-logs:
    driver: local
